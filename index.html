<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Glam Trainer</title>

  <meta name="theme-color" content="#0b0014" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="bg"></div>

  <noscript>
    <div style="padding:12px; margin:12px; border:1px solid rgba(255,255,255,.15); border-radius:12px;">
      Diese App braucht JavaScript, sonst bleibt der Inhalt leer.
    </div>
  </noscript>

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">🔱</div>
      <div class="brand-text">
        <div class="brand-title">Glam Trainer</div>
        <div class="brand-sub" id="todayLabel"></div>
      </div>
    </div>

    <div class="top-actions">
      <select id="dayMode" class="select" aria-label="Tagesmodus">
        <option value="aussetzen">Aussetzen</option>
        <option value="sanft">Sanft</option>
        <option value="normal" selected>Normal</option>
        <option value="herausfordernd">Herausfordernd</option>
      </select>

      <button class="btn secondary" id="btnSync" type="button" title="CSV neu laden" aria-label="CSV neu laden">
        ⟳
      </button>
    </div>
  </header>

  <main class="wrap" role="main">
    <section id="view" aria-live="polite"></section>
  </main>

  <nav class="bottomnav" aria-label="Navigation">
    <button class="navbtn" data-route="#/nav" type="button">Start</button>
    <button class="navbtn" data-route="#/home" type="button">Trainer</button>
    <button class="navbtn" data-route="#/goals" type="button">Ziele</button>
    <button class="navbtn" data-route="#/tasks" type="button">Aufgaben</button>
    <button class="navbtn" data-route="#/log" type="button">Log</button>
    <button class="navbtn" data-route="#/settings" type="button">Einstellungen</button>
  </nav>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
